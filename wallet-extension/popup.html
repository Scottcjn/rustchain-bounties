<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RustChain Wallet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .balance-card {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .balance-amount {
      font-size: 32px;
      font-weight: 700;
      margin: 10px 0;
    }
    .balance-label {
      font-size: 14px;
      opacity: 0.8;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .action-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    .address-box {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      text-align: center;
      word-break: break-all;
      margin-bottom: 15px;
    }
    .tx-history {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      max-height: 200px;
      overflow-y: auto;
    }
    .tx-history h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }
    .tx-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
    }
    .tx-item:last-child {
      border-bottom: none;
    }
    .tx-amount.positive {
      color: #4ade80;
    }
    .tx-amount.negative {
      color: #f87171;
    }
    .snap-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.inactive {
      background: #f87171;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦀 RustChain Wallet</h1>
  </div>

  <div class="balance-card">
    <div class="balance-label">Total Balance</div>
    <div class="balance-amount"><span id="balance">0.00</span> RTC</div>
    <div class="balance-label" id="usd-value">≈ $0.00 USD</div>
  </div>

  <div class="address-box" id="wallet-address">
    Connecting...
  </div>

  <div class="actions">
    <button class="action-btn" onclick="sendRTC()">📤 Send</button>
    <button class="action-btn" onclick="receiveRTC()">📥 Receive</button>
    <button class="action-btn" onclick="swapRTC()">🔄 Swap</button>
    <button class="action-btn" onclick="openExplorer()">🔍 Explorer</button>
  </div>

  <div class="tx-history">
    <h3>Recent Transactions</h3>
    <div id="tx-list">
      <div class="tx-item">
        <span>No transactions yet</span>
      </div>
    </div>
  </div>

  <div class="snap-status">
    <div class="status-dot" id="snap-indicator"></div>
    <span id="snap-text">MetaMask Snap: Not Connected</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
