name: 'RTC Reward Action'
description: 'Awards RTC tokens to contributors when PRs are merged'
author: 'Akibuzzaman Akib'
branding:
  icon: 'gift'
  color: 'blue'

inputs:
  node-url:
    description: 'RustChain node URL'
    required: false
    default: 'https://50.28.86.131'
  amount:
    description: 'RTC amount to award'
    required: false
    default: '5'
  wallet-from:
    description: 'Source wallet name'
    required: false
    default: 'project-fund'
  admin-key:
    description: 'Admin key for RTC node'
    required: true
  dry-run:
    description: 'Test mode without actual payment'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Award RTC Reward
      shell: python
      env:
        INPUT_NODE_URL: ${{ inputs.node-url }}
        INPUT_AMOUNT: ${{ inputs.amount }}
        INPUT_WALLET_FROM: ${{ inputs.wallet-from }}
        INPUT_ADMIN_KEY: ${{ inputs.admin-key }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        python rtc-reward-action.py