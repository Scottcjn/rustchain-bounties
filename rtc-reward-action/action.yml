name: "RTC Reward on PR Merge"
description: "Award RTC tokens to contributors when pull requests are merged"
author: "RustChain Community"

inputs:
  node-url:
    description: "RustChain node API URL"
    required: true
  amount:
    description: "RTC amount to award per merged pull request"
    required: false
    default: "5"
  wallet-from:
    description: "Funding wallet name or address"
    required: true
  admin-key:
    description: "Admin key used by the RustChain reward endpoint"
    required: true
  github-token:
    description: "GitHub token used to read PR data and post comments"
    required: false
    default: ${{ github.token }}
  dry-run:
    description: "If true, validate inputs and post a dry-run comment without sending RTC"
    required: false
    default: "false"

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "award"
  color: "orange"
