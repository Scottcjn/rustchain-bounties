# Example workflow showing how to use rtc-reward-action
name: RTC Reward Example

on:
  pull_request:
    types: [closed]

jobs:
  reward:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: Scottcjn/rtc-reward-action@v1
        with:
          node-url: 'https://50.28.86.131'
          amount: '5'
          wallet-from: 'test-project'
          admin-key: ${{ secrets.RTC_ADMIN_KEY }}
          dry-run: 'true'
