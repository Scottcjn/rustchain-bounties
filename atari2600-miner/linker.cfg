# RustChain Atari 2600 Miner - Linker Configuration
# Memory layout for 4 KB cartridge

MEMORY {
    ZEROPAGE:  start = $0080, size = $0080, type = rw;
    STACK:     start = $0100, size = $0100, type = rw;
    ROM:       start = $F000, size = $1000, type = ro, fill = yes, fillval = $FF;
    VECTORS:   start = $FFFA, size = $0006, type = ro;
}

SEGMENTS {
    ZEROPAGE:  load = ZEROPAGE, type = zp;
    STACK:     load = STACK, type = bss, optional = yes;
    CODE:      load = ROM, type = ro;
    VECTORS:   load = VECTORS, type = ro;
}

# Symbol definitions
SYMBOLS {
    __STACK_START__: value = $0100, type = weak;
    __ROM_START__:   value = $F000, type = weak;
}
