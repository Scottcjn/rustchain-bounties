# PDP-4 Miner Configuration
# RustChain Proof-of-Antiquity Mining

# Node Configuration
NODE_HOST=50.28.86.131
NODE_PORT=8088

# Mining Parameters
EPOCH_TIME=600          # 10 minutes per epoch
DEV_FEE=0.001           # RTC per epoch
DEV_WALLET=founder_dev_fund

# Output Configuration
OUTPUT_MODE=tty         # Options: tty, paper_tape, saved_file
ATTESTATION_DIR=attestations

# Wallet Configuration
WALLET_FILE=wallet.dat
BACKUP_TO_TAPE=true     # Automatically backup wallet to paper tape

# Hardware Configuration (for real PDP-4)
CORE_MEMORY_SIZE=32768  # 32K words
USE_RTC=true            # Use real-time clock if available
PAPER_TAPE_DEVICE=/dev/ttyS0  # Paper tape punch device

# Simulation Configuration
SIMULATE_CORE_TIMING=true
SIMULATE_PC_SKEW=true
ENTROPY_SAMPLES=32

# Logging
LOG_LEVEL=INFO          # DEBUG, INFO, WARN, ERROR
LOG_FILE=pdp4_miner.log
