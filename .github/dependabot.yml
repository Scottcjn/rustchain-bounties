version: 2
updates:
  # Root Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]
    commit-message:
      prefix: "chore(deps)"

  # Subdirectory Python manifests
  - package-ecosystem: "pip"
    directory: "/otc-bridge"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  - package-ecosystem: "pip"
    directory: "/integrations/rustchain-mcp"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  # Subdirectory Node.js manifests
  - package-ecosystem: "npm"
    directory: "/vscode-extension"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  - package-ecosystem: "npm"
    directory: "/tools/verify_bot"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  - package-ecosystem: "npm"
    directory: "/github-tip-bot"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  - package-ecosystem: "npm"
    directory: "/community/github-actions/rtc-reward"
    schedule: { interval: "weekly", day: "monday" }
    labels: ["dependencies", "security"]
    reviewers: ["Scottcjn"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "monthly" }
    labels: ["dependencies", "ci"]
    reviewers: ["Scottcjn"]
