name: Bounty Proof

description: Submit proof of completed bounty work to claim RTC rewards

body:
  - type: markdown
    attributes:
      value: |
        ## Bounty Claim Form
        Please provide all required information to process your RTC bounty claim.

  - type: input
    id: wallet_address
    attributes:
      label: Wallet Address
      description: Your Solana wallet address for receiving RTC rewards
      placeholder: "AhqbFaPBPLMMiaLDzA9WhQcyvv4hMxiteLhPk3NhG1iG"
    validations:
      required: true

  - type: textarea
    id: pr_reviews
    attributes:
      label: PR Reviews
      description: List all PRs reviewed (format: #PR_NUMBER per line, with repository name)
      placeholder: |
        Scottcjn/rustchain-bounties:
        #12168, #12167, #11036, #12227, #11619, #11631, #11703, #11781, #11534, #11536, #12066, #12115, #12124, #12277, #12276, #12275, #12271, #12269, #12268, #12263, #12259, #12258, #12252, #12251, #12248, #12244, #12243, #12234, #12233, #12231, #12224
        
        Scottcjn/RustChain:
        #6132, #6154, #6155, #6159, #6160, #6162, #6170, #6192, #6199, #6201, #6205, #6208, #6659
    validations:
      required: false

  - type: textarea
    id: emoji_reactions
    attributes:
      label: Emoji Reactions
      description: List repositories and number of reactions contributed
      placeholder: |
        Scottcjn/BoTTube: 8 reactions
        Scottcjn/grazer-skill: 8 reactions
        Scottcjn/beacon-skill: 6 reactions
        Scottcjn/clawrtc-rs: 7 reactions
    validations:
      required: false

  - type: input
    id: total_rtc
    attributes:
      label: Total RTC Claimed
      description: Total amount of RTC being claimed
      placeholder: "31.57"
    validations:
      required: true

  - type: textarea
    id: additional_info
    attributes:
      label: Additional Information
      description: Any other relevant information or links
      placeholder: "Optional: provide links to specific comments or evidence"
    validations:
      required: false
