name: Bounty Proof Submission
about: Submit proof for completed bounty task
title: "[BOUNTY PROOF] <brief description>"
labels: bounty-proof
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        ## Bounty Proof Submission
        
        Thank you for contributing! Please provide the details of your completed bounty task.
        
  - type: input
    id: bounty-issue-url
    attributes:
      label: Bounty Issue URL
      description: Link to the original bounty issue
      placeholder: https://github.com/Scottcjn/rustchain-bounties/issues/XXXX
    validations:
      required: true
      
  - type: input
    id: pr-url
    attributes:
      label: Pull Request URL
      description: Link to the PR that fulfills the bounty
      placeholder: https://github.com/Scottcjn/Rustchain/pull/XXXX
    validations:
      required: true
      
  - type: input
    id: review-url
    attributes:
      label: Review URL (if applicable)
      description: Link to the code review
      placeholder: https://github.com/Scottcjn/Rustchain/pull/XXXX#pullrequestreview-XXXX
    validations:
      required: false
      
  - type: input
    id: correction-note-url
    attributes:
      label: Correction Note URL (if applicable)
      description: Link to any correction note
      placeholder: https://github.com/Scottcjn/Rustchain/pull/XXXX#issuecomment-XXXX
    validations:
      required: false
      
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      description: GitHub username of the reviewer
      placeholder: reviewer-username
    validations:
      required: true
      
  - type: input
    id: miner-id
    attributes:
      label: Miner ID
      description: Your miner identifier
      placeholder: username-codex
    validations:
      required: true
      
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief summary of what was reviewed/completed
      placeholder: Describe the changes and verification performed...
    validations:
      required: true
      
  - type: checkboxes
    id: verification
    attributes:
      label: Verification Checklist
      description: Confirm the following
      options:
        - label: I have verified the changes are limited to the intended scope
          required: true
        - label: I have checked that no runtime code or API behavior is changed (if applicable)
          required: false
        - label: I have verified command examples preserve executable paths and placeholders
          required: false
        - label: I have checked protocol terms and reciprocal links
          required: false
