name: Bounty Proof
about: Submit proof of completed bounty work
labels: bounty-proof
body:
  - type: markdown
    attributes:
      value: |
        ## Bounty Proof Submission
        Please provide details of your completed bounty work.
  - type: input
    id: bounty-issue
    attributes:
      label: Bounty Issue URL
      description: Link to the original bounty issue
      placeholder: https://github.com/Scottcjn/rustchain-bounties/issues/1
    validations:
      required: true
  - type: input
    id: pr-url
    attributes:
      label: Pull Request URL
      description: Link to the PR that implements the bounty
      placeholder: https://github.com/Scottcjn/Rustchain/pull/6228
    validations:
      required: true
  - type: input
    id: review-url
    attributes:
      label: Review URL
      description: Link to the code review (if applicable)
      placeholder: https://github.com/Scottcjn/Rustchain/pull/6228#pullrequestreview-4613998102
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description of Work
      description: Summarize what was done
    validations:
      required: true
  - type: input
    id: wallet
    attributes:
      label: RTC Wallet Address
      description: Your RTC wallet address for reward
      placeholder: RTC1410e82d545ce0b3ffd21ca83e2465a8f2c3a64e
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        By submitting, you confirm that the work is original and complies with the bounty rules.