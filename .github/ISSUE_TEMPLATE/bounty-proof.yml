name: Bounty Proof Submission

description: Submit proof of completed bounty work for review and reward

labels: ["bounty-claim"]

body:
  - type: markdown
    attributes:
      value: |
        ## Bounty Claim Submission
        
        Please provide detailed evidence of your completed bounty work.
        
  - type: input
    id: bounty-number
    attributes:
      label: Bounty Number
      description: The number of the bounty you are claiming (e.g., #73)
      placeholder: "#73"
    validations:
      required: true

  - type: input
    id: pr-url
    attributes:
      label: Pull Request URL
      description: Link to the PR that implements the bounty
      placeholder: "https://github.com/Scottcjn/Rustchain/pull/6838"
    validations:
      required: true

  - type: input
    id: review-url
    attributes:
      label: Review URL
      description: Link to your code review on the PR
      placeholder: "https://github.com/Scottcjn/Rustchain/pull/6838#pullrequestreview-4424161691"
    validations:
      required: true

  - type: textarea
    id: review-substance
    attributes:
      label: Review Substance
      description: Describe the substantive feedback you provided in your review (not just rubber-stamping)
      placeholder: |
        - Identified unbounded memory growth in SlidingWindowRateLimiter._requests
        - Flagged burst implementation issues
        - Suggested concrete fixes (OrderedDict-LRU + sweep)
    validations:
      required: true

  - type: input
    id: wallet-address
    attributes:
      label: Wallet Address (Miner ID)
      description: Your Rustchain wallet address for receiving the reward
      placeholder: "RTC51a782cf006436e5134e08049b289639bd8e2116"
    validations:
      required: true

  - type: input
    id: first-reviewer
    attributes:
      label: First Substantive Reviewer
      description: Are you the first person to submit a substantive review on this PR?
      placeholder: "yes"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information relevant to your claim
      placeholder: "..."
