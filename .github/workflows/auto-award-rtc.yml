name: Auto-Award RTC for Merged PRs

on:
  pull_request:
    types: [closed]

jobs:
  award-rtc:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR info
        id: pr_info
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Author: ${{ github.event.pull_request.user.login }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "merged: ${{ github.event.pull_request.merged }}"

      - name: Check if PR author has wallet in profile
        id: wallet_check
        run: |
          echo "Looking for wallet in PR author's profile..."
          # In production, this would query GitHub API for user's wallet
          echo "wallet_found=false" >> $GITHUB_OUTPUT

      - name: Get contribution tier
        id: tier
        run: |
          # Determine RTC reward based on PR complexity
          # This is a simplified example - in production, use:
          # - Files changed
          # - Lines added/deleted
          # - Community impact
          echo "tier=standard" >> $GITHUB_OUTPUT
          echo "reward_amount=5" >> $GITHUB_OUTPUT

      - name: Award RTC tokens
        id: award
        run: |
          # This is where RTC distribution happens
          # For security, use environment variables for sensitive data
          echo "Awarding ${{ steps.tier.outputs.reward_amount }} RTC to ${{ github.event.pull_request.user.login }}"

          # In production:
          # 1. Call RustChain API to transfer tokens
          # 2. Use stored wallet credentials
          # 3. Log transaction

          echo "Transaction simulated successfully" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with reward details
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎉 RTC Reward Awarded!

              Thank you for your contribution! This PR has been merged and you've received:

              | Detail | Value |
              |--------|-------|
              | **Amount** | ${{ steps.tier.outputs.reward_amount || '5' }} RTC |
              | **Tier** | ${{ steps.tier.outputs.tier || 'standard' }} |
              | **Transaction** | Pending blockchain confirmation |

              Your contribution helps make RustChain better! 🚀

              ---
              *Auto-awarded by RustChain GitHub Action*`
            });

      - name: Log award for tracking
        run: |
          echo "=== RTC Award Log ===" >> award_log.txt
          echo "Date: $(date -u)" >> award_log.txt
          echo "PR: #${{ github.event.pull_request.number }}" >> award_log.txt
          echo "Author: ${{ github.event.pull_request.user.login }}" >> award_log.txt
          echo "Reward: ${{ steps.tier.outputs.reward_amount || '5' }} RTC" >> award_log.txt
          echo "=====================" >> award_log.txt
