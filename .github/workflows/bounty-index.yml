name: Generate Bounties Index

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

# Fix #8: this workflow fires on BOTH a 6-hourly schedule and every push to
# main, so two runs can end up generating + pushing at the same time (a
# schedule tick landing mid-merge-storm, or two pushes close together). Each
# run checks out main once at the start and pushes ~20-60s later; if another
# run (of this same workflow) pushes in that window, the second push is
# rejected as non-fast-forward and the whole job fails. Serializing runs
# removes that self-collision. The "Commit bounties.json" step below adds a
# fetch+retry loop on top of this for the remaining case: a real, unrelated
# PR merge landing on main in that same window.
concurrency:
  group: bounty-index-generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Fix #7: main is a protected branch (required PR + BCOS status checks).
          #   The default github-actions[bot] token cannot direct-push, so the
          #   auto-commit was rejected (GH006 protected branch hook declined).
          #   Persist an admin PAT (secret BOUNTY_PUSH_TOKEN) so the auto-commit
          #   push bypasses protection (repo has enforce_admins: false). Falls
          #   back to GITHUB_TOKEN if the secret is unset (commit will still be
          #   blocked until the PAT is added).
          token: ${{ secrets.BOUNTY_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate bounties.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          echo "Fetching open bounties from $REPO..."

          # Fix #2: --paginate to handle repos with >100 issues
          # Fix #3: select(has("pull_request") | not) to exclude PRs
          # Fix #4: -X GET — gh api defaults to POST when -f fields are present,
          #   which was POSTing to /issues (create) -> 422 "title wasn't supplied".
          # Fix #5: with --paginate, gh applies --jq PER PAGE, producing one array
          #   per page (25 pages @ 2400+ issues) -> invalid combined JSON for
          #   --argjson. So fetch raw pages and merge with `jq -s 'add'` once.
          # Fix #6: pipe the bounties array into the wrapper jq instead of
          #   passing it via --argjson. At 1800+ bounties (~750KB) the command
          #   line exceeded ARG_MAX ("jq: Argument list too long", exit 126).
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh api --paginate -X GET "repos/$REPO/issues" \
            -f state=open \
            -f per_page=100 \
            -f sort=created \
            -f direction=desc \
            | jq -s '
              add |
              map(select(has("pull_request") | not)) |
              map(select(
                (.title | test("(?i)bounty|BOUNTY")) or
                (.labels[]?.name | test("(?i)bounty"))
              )) |
              map({
                id: .number,
                title: .title,
                url: .html_url,
                state: .state,
                created_at: .created_at,
                updated_at: .updated_at,
                comments: .comments,
                author: .user.login,
                labels: [.labels[]?.name | select(test("(?i)bounty|open|major|standard|help wanted|integration|community|easy|documentation|red-team"))],
                agents_welcome: ((.body // "") | test("(?i)agents.?welcome|Agents.?welcome"))
              })
            ' \
            | jq --arg updated "$timestamp" --arg repo "$REPO" '{
                updated_at: $updated,
                repo: $repo,
                total: length,
                bounties: .
              }' > bounties.json

          count=$(jq '.total' bounties.json)
          echo "Generated bounties.json with $count bounties"

      - name: Commit bounties.json
        run: |
          # Fix #8 (crash: "non-fast-forward" push rejection): bounties.json
          # is always fully regenerated from scratch (never hand-edited or
          # diffed), so if main moved between our checkout and our push, the
          # safe fix is to re-sync to the new tip and re-apply the freshly
          # generated file, not to try to merge/rebase a partial diff. Retry
          # a few times before giving up loudly.
          cp bounties.json /tmp/bounties-generated.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/bounties-generated.json bounties.json

            if git diff --quiet -- bounties.json; then
              echo "No changes to bounties.json — nothing to commit."
              exit 0
            fi

            git add bounties.json
            git commit -m 'chore: update bounties.json [skip ci]'

            if git push origin HEAD:main; then
              echo "Pushed bounties.json on attempt $attempt"
              exit 0
            fi

            echo "::warning::Push rejected (attempt $attempt/5) — main moved since checkout, retrying..."
            sleep $((attempt * 3))
          done

          echo "::error::Failed to push bounties.json after 5 attempts (main kept moving)"
          exit 1
