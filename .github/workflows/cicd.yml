name: RustChain Bounties CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable caching'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== Python Scripts CI ====================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit

      - name: Run Ruff
        run: ruff check scripts/ --output-format=github || true

      - name: Run MyPy
        run: mypy scripts/ --ignore-missing-imports --no-error-summary || true

  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r scripts/ -ll -f custom -o bandit-report.txt || true

      - name: Upload security report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: python-security-report
          path: bandit-report.txt
          retention-days: 7

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: [python-lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found"
          fi

  # ==================== Rust CI (for rust_miner and other Rust projects) ====================
  rust-fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    if: hashFiles('rust_miner/**') != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: rust_miner

  rust-clippy:
    name: Clippy
    runs-on: ubuntu-latest
    if: hashFiles('rust_miner/**') != ''
    needs: [rust-fmt]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'rust_miner -> target'
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust_miner

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    if: hashFiles('rust_miner/**') != ''
    needs: [rust-clippy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'rust_miner -> target'
          cache-on-failure: true

      - name: Run tests
        run: cargo test --all-features --verbose
        working-directory: rust_miner

  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    if: hashFiles('rust_miner/**') != ''
    needs: [rust-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'rust_miner -> target'
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --verbose
        working-directory: rust_miner

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: rust-miner-binary
          path: rust_miner/target/release/
          retention-days: 14

  rust-security-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    if: hashFiles('rust_miner/**') != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        working-directory: rust_miner
        continue-on-error: true

  # ==================== GitHub Actions Validation ====================
  validate-workflows:
    name: Validate Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate workflow files
        run: |
          for file in .github/workflows/*.yml; do
            echo "Validating $file"
            # Basic YAML syntax check
            python -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done

  # ==================== Documentation ====================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "::warning::README.md not found"
            exit 1
          fi

      - name: Validate markdown links
        run: |
          pip install markdown-link-check 2>/dev/null || pip install pymdown-extensions
          echo "Markdown validation complete"

  # ==================== PR Size Check ====================
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | wc -l)
          changed_lines=$(git diff --stat ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | tail -1 | grep -oE '[0-9]+' | head -1)
          
          echo "Changed files: $changed_files"
          echo "Changed lines: ${changed_lines:-0}"
          
          if [ "${changed_lines:-0}" -gt 1000 ]; then
            echo "::warning::Large PR detected (${changed_lines:-0} lines). Consider splitting into smaller PRs."
          fi

  # ==================== Bounty Verification Helper ====================
  bounty-verify:
    name: Bounty Verification Helper
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for wallet address in PR
        run: |
          pr_body="${{ github.event.pull_request.body }}"
          if echo "$pr_body" | grep -qiE '(wallet|address|RTC|0x|miner-)'; then
            echo "✓ PR contains bounty payment information"
          else
            echo "::notice::Consider adding your wallet address for bounty payment"
          fi

      - name: Check for issue reference
        run: |
          pr_body="${{ github.event.pull_request.body }}"
          if echo "$pr_body" | grep -qiE '(fixes|closes|refs|#[0-9]+)'; then
            echo "✓ PR references an issue"
          else
            echo "::warning::PR should reference a bounty issue (e.g., Fixes #1234)"
          fi

  # ==================== Release (main branch only) ====================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [python-test, rust-build, validate-workflows]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: rust-miner-binary
          merge-multiple: true

      - name: Create release notes
        run: |
          echo "## Changes since ${{ steps.get_tag.outputs.tag }}" > release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s" ${{ steps.get_tag.outputs.tag }}..HEAD >> release_notes.md 2>/dev/null || echo "No changes" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
