# Prometheus scrape configuration for RustChain metrics.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: rustchain-exporter
    static_configs:
      - targets:
          - exporter:9100
        labels:
          instance: rustchain-primary
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 15s
