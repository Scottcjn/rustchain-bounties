<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:;">
    <title>RaptorChain Block Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .search-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .search-btn {
            padding: 12px 24px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .search-btn:hover {
            background: #e55a2b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .blocks-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #ff6b35;
        }

        .blocks-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        .blocks-table th,
        .blocks-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .blocks-table th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .blocks-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .hash-cell {
            font-family: monospace;
            font-size: 0.9em;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .miner-cell {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            opacity: 0.7;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            color: #ffcccc;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .search-results {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
            }
            
            .blocks-table {
                font-size: 0.9em;
            }
            
            .hash-cell {
                max-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦖 RaptorChain Explorer</h1>
            <p>Explore blocks, transactions, and network statistics</p>
        </div>

        <div class="search-section">
            <h2>Search Blockchain</h2>
            <div class="search-form">
                <input type="text" id="searchInput" class="search-input" placeholder="Enter block hash, transaction ID, or address...">
                <button onclick="performSearch()" class="search-btn">Search</button>
            </div>
            <div id="searchResults" class="search-results" style="display: none;"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="blockHeight">-</div>
                <div class="stat-label">Block Height</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalTransactions">-</div>
                <div class="stat-label">Total Transactions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="networkHashrate">-</div>
                <div class="stat-label">Network Hashrate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="difficulty">-</div>
                <div class="stat-label">Difficulty</div>
            </div>
        </div>

        <div class="blocks-section">
            <h2 class="section-title">Latest Blocks</h2>
            <div id="blocksContainer">
                <div class="loading">Loading blockchain data...</div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectInterval = null;

        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') {
                return String(unsafe);
            }
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function sanitizeMinerName(name) {
            if (typeof name !== 'string') {
                return 'Unknown';
            }
            // Remove any potentially dangerous characters and limit length
            return name.replace(/[<>"\'/&]/g, '').substring(0, 50) || 'Unknown';
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket connected');
                if (reconnectInterval) {
                    clearInterval(reconnectInterval);
                    reconnectInterval = null;
                }
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleWebSocketMessage(data);
                } catch (e) {
                    console.error('Error parsing WebSocket message:', e);
                }
            };

            ws.onclose = function() {
                console.log('WebSocket disconnected');
                if (!reconnectInterval) {
                    reconnectInterval = setInterval(connectWebSocket, 5000);
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'stats':
                    updateNetworkStats(data.data);
                    break;
                case 'blocks':
                    updateBlocksList(data.data);
                    break;
                case 'newBlock':
                    prependNewBlock(data.data);
                    break;
            }
        }

        function updateNetworkStats(stats) {
            if (stats.blockHeight !== undefined) {
                document.getElementById('blockHeight').textContent = escapeHtml(stats.blockHeight);
            }
            if (stats.totalTransactions !== undefined) {
                document.getElementById('totalTransactions').textContent = escapeHtml(stats.totalTransactions);
            }
            if (stats.networkHashrate !== undefined) {
                document.getElementById('networkHashrate').textContent = escapeHtml(stats.networkHashrate) + ' H/s';
            }
            if (stats.difficulty !== undefined) {
                document.getElementById('difficulty').textContent = escapeHtml(stats.difficulty);
            }
        }

        function updateBlocksList(blocks) {
            if (!Array.isArray(blocks)) {
                console.error('Invalid blocks data received');
                return;
            }

            const container = document.getElementById('blocksContainer');
            container.innerHTML = createBlocksTable(blocks);
        }

        function createBlocksTable(blocks) {
            if (!blocks || blocks.length === 0) {
                return '<div class="loading">No blocks found</div>';
            }

            let html = `
                <table class="blocks-table">
                    <thead>
                        <tr>
                            <th>Height</th>
                            <th>Hash</th>
                            <th>Timestamp</th>
                            <th>Miner</th>
                            <th>Transactions</th>
                            <th>Size</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            blocks.forEach(block => {
                const timestamp = new Date(block.timestamp || Date.now()).toLocaleString();
                const minerName = sanitizeMinerName(block.miner || block.minerAddress || 'Unknown');
                
                html += `
                    <tr>
                        <td>${escapeHtml(block.height || '-')}</td>
                        <td class="hash-cell" title="${escapeHtml(block.hash || '')}">${escapeHtml((block.hash || '').substring(0, 20))}...</td>
                        <td>${escapeHtml(timestamp)}</td>
                        <td class="miner-cell" title="${escapeHtml(minerName)}">${escapeHtml(minerName)}</td>
                        <td>${escapeHtml(block.transactionCount || block.transactions?.length || 0)}</td>
                        <td>${escapeHtml(block.size || '-')} bytes</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            return html;
        }

        function prependNewBlock(block) {
            const container = document.getElementById('blocksContainer');
            const table = container.querySelector('.blocks-table tbody');
            
            if (table) {
                const timestamp = new Date(block.timestamp || Date.now()).toLocaleString();
                const minerName = sanitizeMinerName(block.miner || block.minerAddress || 'Unknown');
                
                const newRow = document.createElement('tr');
                newRow.innerHTML = `
                    <td>${escapeHtml(block.height || '-')}</td>
                    <td class="hash-cell" title="${escapeHtml(block.hash || '')}">${escapeHtml((block.hash || '').substring(0, 20))}...</td>
                    <td>${escapeHtml(timestamp)}</td>
                    <td class="miner-cell" title="${escapeHtml(minerName)}">${escapeHtml(minerName)}</td>
                    <td>${escapeHtml(block.transactionCount || block.transactions?.length || 0)}</td>
                    <td>${escapeHtml(block.size || '-')} bytes</td>
                `;
                
                table.insertBefore(newRow, table.firstChild);
                
                // Remove last row if too many
                if (table.children.length > 10) {
                    table.removeChild(table.lastChild);
                }
            }
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const query = searchInput.value.trim();

            if (!query) {
                searchResults.style.display = 'none';
                return;
            }

            // Sanitize search query
            const sanitizedQuery = query.replace(/[<>"\'/&]/g, '').substring(0, 100);
            
            searchResults.innerHTML = '<div class="loading">Searching...</div>';
            searchResults.style.display = 'block';

            // Send search request via WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'search',
                    query: sanitizedQuery
                }));
            } else {
                // Fallback to HTTP request
                fetch(`/api/search?q=${encodeURIComponent(sanitizedQuery)}`)
                    .then(response => response.json())
                    .then(data => {
                        displaySearchResults(data);
                    })
                    .catch(error => {
                        console.error('Search error:', error);
                        searchResults.innerHTML = '<div class="error">Search failed. Please try again.</div>';
                    });
            }
        }

        function displaySearchResults(results) {
            const searchResults = document.getElementById('searchResults');
            
            if (!results || (results.blocks?.length === 0 && results.transactions?.length === 0)) {
                searchResults.innerHTML = '<div>No results found</div>';
                return;
            }

            let html = '<h3>Search Results</h3>';

            if (results.blocks && results.blocks.length > 0) {
                html += '<h4>Blocks</h4>';
                html += createBlocksTable(results.blocks);
            }

            if (results.transactions && results.transactions.length > 0) {
                html += '<h4>Transactions</h4>';
                html += '<div>Transaction search results would go here</div>';
            }

            searchResults.innerHTML = html;
        }

        // Handle Enter key in search input
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // Initialize WebSocket connection
            connectWebSocket();
        });

        // Clean up WebSocket on page unload
        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
