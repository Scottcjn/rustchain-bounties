# Add the following configuration to handle the routes
server {
    listen 80;
    server_name rustchain.org;

    location /fossils {
        proxy_pass http://localhost:8080/fossils;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /leaderboard {
        proxy_pass http://localhost:8080/leaderboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /governance {
        proxy_pass http://localhost:8080/governance;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /airdrops {
        proxy_pass http://localhost:8080/airdrops;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

