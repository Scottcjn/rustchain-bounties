name: Bounty Verification

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  issue_comment:
    types: [created]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install python-dotenv

      - name: Run Verification Bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RTC_WALLET: ${{ secrets.RTC_WALLET }}
          SOLANA_WALLET: ${{ secrets.SOLANA_WALLET }}
        run: python rtc_verification_bot.py
