# CC65 Linker Configuration for Apple II
# RustChain Miner

MEMORY {
    ZP:       file = "", start = $0000, size = $0100;
    STACK:    file = "", start = $0100, size = $0100;
    MAIN:     file = %O, start = $0800, size = $9800;  # Apple II program space
    HIRES:    file = %O, start = $2000, size = $2000;  # Hires graphics (optional)
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    STACK:    load = STACK, type = bss;
    CODE:     load = MAIN, type = rw;
    DATA:     load = MAIN, type = rw;
    RODATA:   load = MAIN, type = ro;
    BSS:      load = MAIN, type = bss;
    ONCE:     load = MAIN, type = ro;
}

FEATURES {
    CONDES: segment = STARTUP,
            type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__;
    CONDES: segment = STARTUP,
            type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__;
}

SYMBOLS {
    # Define start address
    __STACKSIZE__: value = $0100, type = weak;
}
