/*
 * linker.cfg - Memory layout for Atari ST Miner
 * 
 * Standard ST (512 KB):
 *   $004000-$07FFFF: Application RAM (~480 KB free)
 * 
 * STE (4 MB):
 *   $004000-$3FFFFF: Application RAM (up to 4 MB)
 */

/* Memory regions */
MEMORY
{
    /* TOS application area starts at $004000 */
    RAM (rwx) : ORIGIN = 0x004000, LENGTH = 480K
    
    /* Optional: Use extra RAM on STE */
    /* RAM_EXT (rwx) : ORIGIN = 0x080000, LENGTH = 3584K */
}

/* Section mapping */
SECTIONS
{
    /* Code section */
    .text : {
        *(.text)
        *(.text.*)
        *(.rodata)
        *(.rodata.*)
    } > RAM

    /* Data section (initialized globals) */
    .data : {
        _data_start = .;
        *(.data)
        *(.data.*)
        _data_end = .;
    } > RAM

    /* BSS section (uninitialized globals) */
    .bss : {
        _bss_start = .;
        *(.bss)
        *(.bss.*)
        *(COMMON)
        _bss_end = .;
    } > RAM

    /* Stack grows downward from top of RAM */
    /* Stack size: 16 KB */
    _stack_size = 16K;
    _stack_top = ORIGIN(RAM) + LENGTH(RAM);
    _stack_bottom = _stack_top - _stack_size;

    /* Symbols for C runtime */
    _mem_start = ORIGIN(RAM);
    _mem_end = ORIGIN(RAM) + LENGTH(RAM);
}

/* Entry point */
ENTRY(_start)

/* Output format: TOS executable */
OUTPUT_FORMAT("tos")
