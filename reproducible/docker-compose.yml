version: '3.8'

services:
  rustchain-miner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - WALLET=my-wallet
      - NODE_URL=my-node-url
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  default:
    driver: bridge