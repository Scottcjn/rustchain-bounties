# SIMH IBM 7090 Configuration for RustChain Miner
# 
# This configuration sets up an IBM 7090 (transistorized IBM 709)
# to run the RustChain Proof-of-Antiquity miner.
#
# Usage:
#   sim> ibm7090 ibm7090.ini
#
# The simulator will load the miner and begin execution.

# CPU Configuration
set cpu 32k                 # 32K words of core memory (max for 709/7090)
set cpu idle                # Enable idle simulation

# I/O Channel Configuration
# IBM 766 Data Synchronizer with tape drives

# Tape Unit 0: Attestation Output
attach tape0n attestation_output.tap
set tape0n locked           # Write-enabled

# Tape Unit 1: Wallet Backup
attach tape1n wallet_backup.tap
set tape1n locked

# Card Reader (for loading initial program)
attach card reader miner_cards.pun

# Card Punch (optional output)
attach punch punch_output.pun

# Line Printer (optional logging)
attach printer printer_output.txt

# Load the miner program
# The miner should be assembled and converted to binary format
# load miner.bin

# Alternative: Bootstrap from cards
# The FAP source would be assembled offline and loaded via cards

# Start address
# The miner entry point is at location 1000 (octal)
# deposit PC 1000

# Run the miner
# run

# Notes:
# - The miner writes attestations to tape0n
# - Modern host script reads the tape image and submits to RustChain
# - Wallet is stored on tape1n for persistence
# - SIMH simulates the IBM 7090, which is binary-compatible with IBM 709

# For interactive debugging:
# - STEP: Single step execution
# - EXAMINE AC: View accumulator
# - EXAMINE PC: View program counter
# - DEPOSIT location value: Set memory location

# Expected tape output format (per attestation):
# Word 0:  ATTEST_MARKER (octal 777777777777)
# Word 1-3: Wallet ID
# Word 4:  Timestamp
# Word 5-7: Attestation hash
# Word 8:  Checksum

# To export tape for modern submission:
# sim> detach tape0n
# Then use submit_host.py to read and submit
