# ============================================================
# RustChain Miner — docker-compose
# One command to start mining:
#   docker-compose -f docker-compose.miner.yml up -d
# ============================================================

services:
  rustchain-miner:
    build:
      context: .
      dockerfile: Dockerfile.miner
      platforms:
        - linux/amd64
        - linux/arm64
        - linux/arm/v7
    image: ghcr.io/scottcjn/rustchain-miner:latest
    container_name: rustchain-miner
    restart: unless-stopped
    environment:
      WALLET_NAME: ${WALLET_NAME:?WALLET_NAME is required}
      NODE_URL: ${NODE_URL:-https://50.28.86.131}
      BLOCK_TIME: ${BLOCK_TIME:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    env_file:
      - .env.miner
    volumes:
      # Persist miner state
      - rustchain-miner-data:/app/data
      # Mount host devices for hardware fingerprinting (if needed)
      # - /dev:/dev:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Uncomment for Raspberry Pi / ARM devices
    # devices:
    #   - /dev/mem:/dev/mem:ro
    #   - /dev/cpu:/dev/cpu:ro
    privileged: false
    read_only: false

  # Optional: Prometheus metrics exporter
  prometheus:
    image: prom/prometheus:latest
    container_name: rustchain-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - rustchain-miner

volumes:
  rustchain-miner-data:
  prometheus-data:
