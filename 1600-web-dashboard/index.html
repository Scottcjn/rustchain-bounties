<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustChain Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px; color: #00d9ff; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2.5em; color: #00d9ff; font-weight: bold; }
        .stat-label { color: #888; margin-top: 5px; }
        .blocks { background: #16213e; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .block-item { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .refresh { text-align: center; padding: 20px; }
        button { background: #00d9ff; color: #1a1a2e; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #00b8d4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 RustChain Dashboard</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="blockNumber">-</div>
                <div class="stat-label">Latest Block</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="chainId">-</div>
                <div class="stat-label">Chain ID</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="peerCount">-</div>
                <div class="stat-label">Connected Peers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="gasPrice">-</div>
                <div class="stat-label">Gas Price (Gwei)</div>
            </div>
        </div>

        <div class="blocks">
            <h2>Recent Blocks</h2>
            <div id="blocksList"></div>
        </div>

        <div class="refresh">
            <button onclick="refreshData()">🔄 Refresh</button>
        </div>
    </div>

    <script>
        const RPC_URL = 'https://rpc.rustchain.com';

        async function rpcCall(method, params = []) {
            const response = await fetch(RPC_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jsonrpc: '2.0', method, params, id: 1 })
            });
            const data = await response.json();
            return data.result;
        }

        async function refreshData() {
            try {
                const blockNum = await rpcCall('eth_blockNumber');
                document.getElementById('blockNumber').textContent = parseInt(blockNum, 16).toLocaleString();

                const chainId = await rpcCall('eth_chainId');
                document.getElementById('chainId').textContent = parseInt(chainId, 16);

                const gasPrice = await rpcCall('eth_gasPrice');
                document.getElementById('gasPrice').textContent = (parseInt(gasPrice, 16) / 1e9).toFixed(2);

                document.getElementById('peerCount').textContent = 'Active';

                // Load recent blocks
                const blocksList = document.getElementById('blocksList');
                blocksList.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const block = await rpcCall('eth_getBlockByNumber', [parseInt(blockNum, 16) - i, false]);
                    if (block) {
                        blocksList.innerHTML += `
                            <div class="block-item">
                                <span>Block #${parseInt(block.number, 16).toLocaleString()}</span>
                                <span>${block.transactions.length} txns</span>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Initial load
        refreshData();
        // Auto refresh every 10 seconds
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
